{% set name = "langchain-protocol" %}
{% set version = "0.0.15" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/langchain_protocol-{{ version }}.tar.gz
  sha256: 9ab2d11ee73944754f10e037e717098d3a6796f0e58afa9cadda6154e7655ade

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - typing_extensions >=4.7.0,<5.0.0

test:
  imports:
    - langchain_protocol
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/langchain-ai/agent-protocol
  summary: Python bindings for the LangChain agent streaming protocol
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: https://github.com/langchain-ai/agent-protocol

extra:
  recipe-maintainers:
    - jan-janssen
