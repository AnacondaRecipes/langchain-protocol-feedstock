{% set name = "langchain-protocol" %}
{% set version = "0.0.18" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: ec3e11782f1ed0c9db38e5a9ed01b0e7a0d3fba406faa8aef6594b73c56a63e6

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - typing_extensions >=4.13.0,<5.0.0

test:
  imports:
    - langchain_protocol
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://github.com/langchain-ai/agent-protocol
  summary: Python bindings for the LangChain agent streaming protocol
  description: |
    langchain-protocol provides Python bindings for the LangChain agent
    streaming protocol, defining the wire format used by LangChain-based
    agents to stream incremental updates between components.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://github.com/langchain-ai/agent-protocol/tree/main/streaming
  dev_url: https://github.com/langchain-ai/agent-protocol

extra:
  recipe-maintainers:
    - jan-janssen
